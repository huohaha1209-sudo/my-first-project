<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#050508" />
  <title>AURA — 音乐</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- 登录 / 注册（本机 localStorage，演示用勿存真实密码） -->
  <div id="loginScreen" class="login-screen" aria-modal="true" role="dialog" aria-labelledby="loginTitle">
    <div class="login-card glass">
      <p class="login-brand">AURA</p>
      <h1 id="loginTitle" class="login-title">欢迎</h1>
      <p class="login-desc">本机账户 · 注册后自动登录 · 头像与偏好仅存于浏览器</p>

      <div class="auth-tabs" role="tablist" aria-label="登录或注册">
        <button type="button" class="auth-tab is-active" id="authTabLogin" role="tab" aria-selected="true">登录</button>
        <button type="button" class="auth-tab" id="authTabRegister" role="tab" aria-selected="false">注册</button>
      </div>

      <p id="authError" class="auth-error" role="alert" hidden></p>

      <form id="loginForm" class="login-form auth-panel" data-panel="login">
        <label class="login-label">
          <span>邮箱 / 昵称</span>
          <input type="text" id="loginEmail" class="login-input" placeholder="可留空或随便输入" autocomplete="off" />
        </label>
        <label class="login-label">
          <span>密码</span>
          <input type="password" id="loginPass" class="login-input" placeholder="可留空，直接登录" autocomplete="off" />
        </label>
        <button type="submit" class="login-submit">登录</button>
      </form>

      <form id="registerForm" class="login-form auth-panel" data-panel="register" hidden>
        <label class="login-label">
          <span>昵称</span>
          <input type="text" id="regName" class="login-input" placeholder="例如：Nova" required autocomplete="nickname" />
        </label>
        <label class="login-label">
          <span>邮箱</span>
          <input type="email" id="regEmail" class="login-input" placeholder="you@example.com" required autocomplete="email" />
        </label>
        <label class="login-label">
          <span>密码</span>
          <input type="password" id="regPass" class="login-input" placeholder="至少 4 位" required minlength="4" autocomplete="new-password" />
        </label>
        <label class="login-label">
          <span>确认密码</span>
          <input type="password" id="regPass2" class="login-input" placeholder="再次输入密码" required minlength="4" autocomplete="new-password" />
        </label>
        <button type="submit" class="login-submit">注册并进入</button>
      </form>
    </div>
  </div>

  <div id="appRoot" class="app-root" hidden>
    <div class="bg-base" aria-hidden="true"></div>
    <div class="bg-radials" aria-hidden="true"></div>
    <div class="bg-orbs" aria-hidden="true">
      <span class="orb orb--cyan"></span>
      <span class="orb orb--violet"></span>
      <span class="orb orb--magenta"></span>
    </div>
    <div class="bg-noise" aria-hidden="true"></div>

    <header class="chrome-bar glass">
      <div class="chrome-brand" aria-hidden="true">AURA</div>
      <form id="chromeSearchForm" class="chrome-search" role="search">
        <input
          type="search"
          id="chromeSearchInput"
          class="chrome-search-input"
          placeholder="搜索歌曲、艺人…"
          autocomplete="off"
          aria-label="全局搜索 iTunes"
        />
        <button type="submit" id="btnChromeSearch" class="chrome-search-btn" aria-label="搜索">
          <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
        </button>
      </form>
      <div class="chrome-actions">
        <button type="button" id="btnTheme" class="chrome-icon-btn" title="切换深浅色" aria-label="切换深浅色">
          <svg class="icon-theme-dark" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M9.37 5.51c-.18.64-.27 1.31-.27 1.99 0 4.08 3.32 7.4 7.4 7.4.68 0 1.35-.09 1.99-.27A7.003 7.003 0 0112 19c-3.86 0-7-3.14-7-7 0-2.93 1.81-5.45 4.37-6.49z"/></svg>
          <svg class="icon-theme-light" viewBox="0 0 24 24" width="20" height="20" aria-hidden="true" hidden><path fill="currentColor" d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2v-2H2v2zm18 0h2v-2h-2v2zM11 2v2h2V2h-2zm0 18v2h2v-2h-2zM4.93 4.93l1.41 1.41 1.41-1.41-1.41-1.41-1.41 1.41zm12.02 12.02l1.41 1.41 1.41-1.41-1.41-1.41-1.41 1.41zM4.93 19.07l1.41-1.41-1.41-1.41-1.41 1.41 1.41 1.41z"/></svg>
        </button>
        <div class="user-wrap">
          <input type="file" id="avatarFileInput" accept="image/png,image/jpeg" hidden />
          <button type="button" id="userAvatarBtn" class="user-avatar" aria-label="上传头像，支持 PNG / JPG">
            <img id="userAvatarImg" class="user-avatar-img" alt="" width="40" height="40" hidden decoding="async" />
            <span id="userAvatarText" class="user-avatar-text">?</span>
            <span class="user-avatar-hint" aria-hidden="true">更换头像</span>
          </button>
          <button type="button" id="userMenuBtn" class="user-menu-btn" aria-haspopup="true" aria-expanded="false" aria-label="账户菜单" title="菜单">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path fill="currentColor" d="M12 8c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zm0 2c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2zm0 6c-1.1 0-2 .9-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z"/></svg>
          </button>
          <div id="userDropdown" class="user-dropdown" hidden role="menu">
            <p id="userDropdownName" class="user-dropdown-name"></p>
            <button type="button" id="btnAvatarFromMenu" class="user-dropdown-btn user-dropdown-btn--accent" role="menuitem">更换头像…</button>
            <button type="button" id="btnLogout" class="user-dropdown-btn" role="menuitem">退出登录</button>
          </div>
        </div>
      </div>
    </header>

    <main class="player-app page-enter" role="application" aria-label="音乐播放器">
      <section class="panel panel--main glass enter-card" style="--enter-i: 0">
        <header class="player-header">
          <p class="player-kicker">CYBER · GLASS</p>
          <h1 class="player-title">AURA</h1>
          <p class="player-sub">流媒体级控件 · iTunes 试听 · 收藏与最近仅保存在本机</p>
        </header>

        <div class="artwork-wrap" id="artworkWrap">
          <div class="artwork-neon-ring" aria-hidden="true"></div>
          <div class="artwork-breath" aria-hidden="true"></div>
          <div class="artwork-bloom" aria-hidden="true"></div>
          <div class="vinyl-plate" aria-hidden="true">
            <span class="vinyl-groove"></span>
            <span class="vinyl-label"></span>
          </div>
          <div class="vinyl-ring" aria-hidden="true"></div>
          <div class="artwork-disk">
            <img
              id="coverImage"
              class="cover-img"
              src="https://picsum.photos/seed/neon1/400/400"
              alt="当前专辑封面"
              width="280"
              height="280"
              draggable="false"
            />
          </div>
        </div>

        <div class="track-meta">
          <div class="track-meta-row">
            <div class="track-meta-text">
              <h2 id="trackTitle" class="track-title">加载中…</h2>
              <p id="trackArtist" class="track-artist">—</p>
              <p id="trackAlbum" class="track-album"></p>
            </div>
            <button type="button" id="btnFavorite" class="btn-favorite" title="收藏当前歌曲" aria-pressed="false" aria-label="收藏">
              <svg class="icon-heart-outline" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M16.5 3c-1.74 0-3.41.81-4.5 2.09C10.91 3.81 9.24 3 7.5 3 4.42 3 2 5.42 2 8.5c0 3.78 3.4 6.86 8.55 11.54L12 21.35l1.45-1.32C18.6 15.36 22 12.28 22 8.5 22 5.42 19.58 3 16.5 3zm-4.4 15.55l-.1.1-.1-.1C7.14 14.24 4 11.39 4 8.5 4 6.5 5.5 5 7.5 5c1.54 0 3.04.99 3.57 2.36h1.87C13.46 5.99 14.96 5 16.5 5c2 0 3.5 1.5 3.5 3.5 0 2.89-3.14 5.74-7.9 10.05z"/></svg>
              <svg class="icon-heart-fill" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" hidden><path fill="currentColor" d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
            </button>
          </div>
        </div>

        <div class="progress-block">
          <div
            id="progressBar"
            class="progress-bar"
            role="slider"
            tabindex="0"
            aria-label="播放进度"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0"
          >
            <div id="progressFill" class="progress-fill"></div>
            <div id="progressKnob" class="progress-knob"></div>
          </div>
          <div class="time-row">
            <span id="timeCurrent">0:00</span>
            <span id="previewHint" class="preview-hint" hidden>iTunes 试听约 30 秒</span>
            <span id="timeDuration">0:00</span>
          </div>
        </div>

        <div class="visualizer-wrap glass-inset">
          <canvas id="spectrumCanvas" class="spectrum-canvas" width="720" height="140" aria-hidden="true"></canvas>
        </div>

        <div class="controls-row controls-row--main">
          <button type="button" id="btnShuffle" class="icon-btn ctrl-stagger" style="--stagger: 1" title="随机播放" aria-pressed="false" aria-label="随机播放">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M10.59 9.17L5.41 4 4 5.41l5.17 5.17 1.42-1.41zM14.5 4l2.04 2.04L4 18.59 5.41 20 17.96 7.46 20 9.5V4h-5.5zm.33 14.41l1.41 1.41 5.17-5.17L20 13.59 14.83 18.76l-1-1.35z"/></svg>
          </button>
          <button type="button" id="btnPrev" class="icon-btn icon-btn--lg ctrl-stagger" style="--stagger: 2" title="上一首" aria-label="上一首">
            <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path fill="currentColor" d="M6 6h2v12H6V6zm3.5 6l8.5-6v12l-8.5-6z"/></svg>
          </button>
          <button type="button" id="btnPlay" class="play-btn ctrl-stagger" style="--stagger: 3" title="播放" aria-label="播放">
            <svg class="icon-play" viewBox="0 0 24 24" width="38" height="38" aria-hidden="true"><path fill="currentColor" d="M8 5v14l11-7L8 5z"/></svg>
            <svg class="icon-pause" viewBox="0 0 24 24" width="38" height="38" aria-hidden="true" hidden><path fill="currentColor" d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <button type="button" id="btnNext" class="icon-btn icon-btn--lg ctrl-stagger" style="--stagger: 4" title="下一首" aria-label="下一首">
            <svg viewBox="0 0 24 24" width="28" height="28" aria-hidden="true"><path fill="currentColor" d="M6 18l8.5-6L6 6v12zm2-8.14L13.03 12 8 15.86v-5.72zM16 6h2v12h-2V6z"/></svg>
          </button>
          <button type="button" id="btnRepeat" class="icon-btn ctrl-stagger" style="--stagger: 5" title="循环模式" aria-label="循环模式" data-mode="all">
            <svg class="repeat-all" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4z"/></svg>
            <svg class="repeat-one" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" hidden><path fill="currentColor" d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v4zm-4-2V9h-2v1h2v5h-2v1h4v-1h-2z"/></svg>
            <svg class="repeat-off" viewBox="0 0 24 24" width="22" height="22" aria-hidden="true" hidden><path fill="currentColor" d="M2.81 2.81L1.39 4.22 5 7.83V19h10v3l4-4-4-4v3H7.83l10 10 1.41-1.41L2.81 2.81zM5 19V8.83l9.17 9.17H5zM16.17 5l-2-2H19l4 4-4 4h-2.83l2-2H17V5h-.83z"/></svg>
          </button>
        </div>

        <div class="volume-row">
          <span class="volume-label" aria-hidden="true">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
          </span>
          <input type="range" id="volumeSlider" class="volume-slider" min="0" max="1" step="0.01" value="0.85" aria-label="音量" />
        </div>
      </section>

      <aside class="panel panel--list glass enter-card" style="--enter-i: 1">
        <div class="search-block glass-inset">
          <form id="searchForm" class="search-form" role="search" aria-label="本地与 iTunes 搜索">
            <input
              type="search"
              id="searchInput"
              class="search-input"
              placeholder="实时过滤本地列表；回车可搜索 iTunes…"
              autocomplete="off"
              enterkeyhint="search"
              aria-label="搜索播放列表或 iTunes 曲库"
            />
            <button type="submit" id="btnSearch" class="search-submit" aria-label="搜索 iTunes">
              <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </button>
          </form>
          <p id="searchStatus" class="search-status" role="status"></p>
          <button type="button" id="btnRestoreDefault" class="text-link" hidden>恢复推荐歌单</button>
        </div>

        <div class="list-tabs" role="tablist" aria-label="资料库视图">
          <button type="button" class="list-tab is-active" id="tabQueue" role="tab" aria-selected="true">播放队列</button>
          <button type="button" class="list-tab" id="tabFavorites" role="tab" aria-selected="false">收藏</button>
          <button type="button" class="list-tab" id="tabRecent" role="tab" aria-selected="false">最近播放</button>
        </div>

        <div class="list-header">
          <div class="list-title-wrap">
            <h3 id="listTitle" class="list-title">播放列表</h3>
            <button type="button" id="btnTogglePlaylist" class="playlist-toggle" aria-expanded="true">折叠列表</button>
          </div>
          <span id="playlistHint" class="list-hint">点击播放</span>
        </div>
        <ul id="playlistEl" class="playlist" role="listbox" aria-label="歌曲列表"></ul>
      </aside>
    </main>
  </div>

  <audio id="audioEl" preload="metadata"></audio>

  <div id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true" hidden>
    <span id="toastText" class="toast-text"></span>
  </div>

  <script src="script.js"></script>
</body>
</html>
